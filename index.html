<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evilgodxu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* 头像 */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 32px;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }

        /* 标题区域 */
        .header {
            margin-bottom: 80px;
        }

        .name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .name span {
            color: #999;
            font-weight: 600;
        }

        .motto {
            font-size: 16px;
            color: #888;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 17px;
            color: #555;
            line-height: 1.8;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 统计数据区域 */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border-top: 1px solid #ddd;
            border-left: 1px solid #ddd;
        }

        .stat-item {
            padding: 40px 20px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: background 0.2s;
        }

        .stat-item:hover {
            background: #eaeaea;
        }

        .stat-number {
            font-size: 44px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .stat-label {
            font-size: 14px;
            color: #999;
            font-weight: 400;
        }

        /* 链接区域 */
        .links {
            margin-top: 60px;
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .links a:hover {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .name {
                font-size: 36px;
            }
            .motto {
                font-size: 14px;
            }
            .stat-number {
                font-size: 32px;
            }
            .stat-item {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头像 -->
        <img src="https://github.com/Evilgodxu.png" alt="avatar" class="avatar">

        <!-- 标题区域 -->
        <div class="header">
            <h1 class="name">Evilgodxu <span>Developer</span></h1>
            <p class="motto">生时由命，夙梦得践。</p>
            <p class="tagline">
                Android 开发者，专注 Kotlin + Jetpack Compose。<br>
                探索移动端工具、系统交互与 AI 沟通方式。
            </p>
        </div>

        <!-- 统计数据 -->
        <div class="stats">
            <a href="https://github.com/Evilgodxu" class="stat-item" target="_blank">
                <div class="stat-number">6+</div>
                <div class="stat-label">开源项目</div>
            </a>
            <div class="stat-item">
                <div class="stat-number">Kotlin</div>
                <div class="stat-label">主力语言</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">Compose</div>
                <div class="stat-label">UI 框架</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">Android</div>
                <div class="stat-label">开发平台</div>
            </div>
        </div>

        <!-- 外部链接 -->
        <div class="links">
            <a href="https://github.com/Evilgodxu" target="_blank">GitHub</a>
            <a href="mailto:my2973257684@gmail.com">Email</a>
            <a href="https://qm.qq.com/q/NtUn4tOqUc?from=tim" target="_blank">TIM</a>
        </div>
    </div>
</body>
</html>
